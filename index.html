<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Feliz Cumpleaños Frida!</title>
    <meta
      name="description"
      content="Invitación de Cumpleaños para Frida Calderon"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="image-wrapper">
          <img src="lafrida.jpg" alt="Frida Calderon" class="profile-pic" />
          <div class="glow"></div>
        </div>

        <div class="content">
          <h1 class="title">¡Feliz Cumpleaños!</h1>
          <h2 class="subtitle">Frida Calderon</h2>

          <p class="message">
            Te invitamos a celebrar este día tan especial.<br />
            ¡Vamos a festejar a lo grande!
          </p>

          <div class="audio-control">
            <p class="music-label">🎵 Dale play a la fiesta 🎵</p>
            <audio id="bg-music" controls>
              <source src="oyegelda.mp3" type="audio/mpeg" />
              Tu navegador no soporta el elemento de audio.
            </audio>
          </div>
        </div>
      </div>

      <div class="confetti-container"></div>
    </div>
    
    <div id="enter-overlay" class="overlay">
        <div class="overlay-content">
            <h1>¡Hola!</h1>
            <p>Tenemos una sorpresa para ti</p>
            <button id="enter-btn">Ver Invitación</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const overlay = document.getElementById('enter-overlay');
        const btn = document.getElementById('enter-btn');
        
        audio.volume = 0.5;

        btn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                audio.play().catch(e => console.log("Audio play failed:", e));
                
                // Trigger confetti or entrance animations here if needed
                document.querySelectorAll('.title, .subtitle, .message, .audio-control').forEach(el => {
                    el.style.animationPlayState = 'running';
                });
            }, 500);
        });
        
        // Pause animations initially if we want them to start after click
        // For now, let's just let them run or reset them. 
        // A simple approach is just hiding the overlay.
    </script>
  </body>
</html>
